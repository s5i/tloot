<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="title">TLoot</title>
    <link rel="stylesheet" href="style.css">
    <script src="wasm_exec.js"></script>
    <script src="main.js"></script>
</head>

<body>
    <table>
        <tr>
            <td id="motd" colspan="3"> </td>
        </tr>
        <tr>
            <td class="item-settings">
                <div class="global-buttons">
                    <button id="enableAll">Enable All</button>
                    <button id="disableAll">Disable All</button>
                    <button id="resetPrices">Reset Prices</button>
                </div>
                <hr>
                <span id="itemSettings" class="item-settings"></span>
            </td>
            <td class="no-stretch" id="images"><img id="exampleImage" src="example.png"></td>
            <td>
                <div id="status" class="bold">Status: waiting for the screenshot...</div>
                <hr>
                <div><span id="found"></span> </div>
            </td>
        </tr>
    </table>
</body>

</html>
